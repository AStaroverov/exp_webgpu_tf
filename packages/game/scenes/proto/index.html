<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>viewer — entity viewer</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0b0d12;
        overflow: hidden;
        font-family: ui-monospace, monospace;
        color: #9aa4b2;
      }
      #app {
        display: grid;
        grid-template-columns: 220px 1fr 240px;
        width: 100vw;
        height: 100vh;
      }
      #viewport {
        position: relative;
        min-width: 0;
        min-height: 0;
      }
      #c {
        width: 100%;
        height: 100%;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="viewport"><canvas id="c"></canvas></div>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
