[package]
name = "burn_rl"
version = "0.0.0"
edition = "2021"
publish = false
description = "Test implementation of PPO (train loop + inference) in Burn, running in the browser on WebGPU via wasm."

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# Burn with the WebGPU backend + autodiff. default-features = false drops std /
# tokio / dataset tooling that does not exist in the browser; we drive the loop by hand.
burn = { version = "0.21", default-features = false, features = ["wgpu", "autodiff"] }

# wasm glue
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
console_error_panic_hook = "0.1"

# getrandom needs an explicit browser backend on wasm (see .cargo/config.toml).
# burn pulls it in for parameter init.
getrandom = { version = "0.3", features = ["wasm_js"] }

[profile.release]
opt-level = 3
lto = true
