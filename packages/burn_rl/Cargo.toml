[package]
name = "burn_rl"
version = "0.0.0"
edition = "2021"
publish = false
description = "Test implementation of PPO (train loop + inference) in Burn, running in the browser on WebGPU via wasm."

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# Burn with the WebGPU backend + autodiff. default-features = false drops std /
# tokio / dataset tooling that does not exist in the browser; we drive the loop by hand.
# Record (checkpoint serialization, used by src/record.rs) is built into
# burn-core; there is no separate "record" feature in burn 0.21.
#
# `fusion` + `autotune` are part of burn-wgpu's OWN default features, but
# `default-features = false` above drops them — they must be re-listed explicitly
# or the wgpu backend runs UNFUSED (every elementwise op its own GPU dispatch). On
# this tiny, dispatch-bound Perceiver net the unfused build was ~3.4× slower than
# the tfjs WebGPU backend. With `fusion` on, the `Wgpu` type alias auto-resolves to
# `Fusion<CubeBackend<WgpuRuntime>>` (see burn-wgpu lib.rs) — no backend-type change.
#
# `autotune` is deliberately NOT enabled: in the BROWSER it makes cubecl autotune
# matmul and pick a vectorized variant whose generated WGSL the browser's WebGPU
# (Dawn) rejects ("Invalid ShaderModule matmul_entry_lhs_f32_..."), breaking the
# pipeline. Fusion alone is browser-safe.
burn = { version = "0.21", default-features = false, features = [
    "wgpu",
    "autodiff",
    "fusion",
] }

# serialization for checkpoint weights (bincode) + JSON metadata
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bincode = "1"

# wasm glue
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
console_error_panic_hook = "0.1"

# getrandom needs an explicit browser backend on wasm (see .cargo/config.toml).
# burn pulls it in for parameter init. TWO major versions coexist in the tree:
# 0.3 (older burn crates) and 0.4 (via rand 0.10, pulled in once `fusion` is on).
# Each must have its `wasm_js` feature enabled or the wasm build can't link an
# entropy source; the renamed entry forces it for the 0.4 instance.
getrandom = { version = "0.3", features = ["wasm_js"] }
getrandom_v04 = { package = "getrandom", version = "0.4", features = ["wasm_js"] }

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
# Native smoke test drives the async Trainer methods to completion.
pollster = "0.4"
# CPU backend, native-test-only: isolates GPU floating-point non-determinism
# from model-logic bugs (the v4 forward must be bit-exact on NdArray).
burn-ndarray = { version = "0.21", default-features = false }

[profile.release]
opt-level = 3
lto = true
