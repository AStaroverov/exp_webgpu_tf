<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>viewer — entity viewer</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0b0d12;
        overflow: hidden;
        font-family: ui-monospace, monospace;
        color: #9aa4b2;
      }
      #app {
        display: grid;
        grid-template-columns: 220px 1fr;
        width: 100vw;
        height: 100vh;
      }
      #panel {
        background: #11141b;
        border-right: 1px solid #1c212c;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        font-size: 12px;
      }
      #panel label {
        display: block;
        margin-bottom: 4px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #5c6675;
      }
      #panel select,
      #panel button {
        width: 100%;
        background: #1a1f29;
        color: #cdd5e0;
        border: 1px solid #2a3140;
        border-radius: 4px;
        padding: 6px 8px;
        font: inherit;
        cursor: pointer;
      }
      #tree,
      #components {
        font-size: 12px;
        line-height: 1.5;
        color: #cdd5e0;
        overflow: auto;
      }
      #tree > div {
        white-space: nowrap;
        cursor: pointer;
      }
      #tree > div.selected {
        background: #1f2a3a;
        color: #e7edf5;
      }
      #components > div {
        white-space: nowrap;
      }
      #viewport {
        position: relative;
        min-width: 0;
        min-height: 0;
      }
      #c {
        width: 100%;
        height: 100%;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="panel">
        <div>
          <label for="entity-select">Entity</label>
          <select id="entity-select"></select>
        </div>
        <button id="regen">Regenerate</button>
        <div>
          <label>Hierarchy</label>
          <div id="tree"></div>
        </div>
        <div>
          <label>Components</label>
          <div id="components"></div>
        </div>
      </div>
      <div id="viewport"><canvas id="c"></canvas></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
